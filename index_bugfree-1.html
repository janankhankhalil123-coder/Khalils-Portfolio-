<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;scroll-behavior:smooth}
body{background:#000;color:white;overflow-x:hidden}
.matrix{background-image:linear-gradient(rgba(0,255,255,.08) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,255,.08) 1px,transparent 1px);background-size:40px 40px}
.glow{box-shadow:0 0 40px rgba(0,255,255,.35)}
.float{animation:float 4s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}
.typing{overflow:hidden;white-space:nowrap;border-right:3px solid cyan;width:0;animation:typing 5s steps(40,end) infinite alternate}
@keyframes typing{from{width:0}to{width:100%}}
.card:hover{transform:translateY(-10px) scale(1.03)}
.ai-video{background:linear-gradient(135deg,#06b6d4,#7c3aed,#ec4899);background-size:400% 400%;animation:gradient 10s ease infinite}
@keyframes gradient{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
</style>

<style>
/* Upgrades */
#particles-js{
position:fixed;
inset:0;
z-index:-15;
}

.reveal{
opacity:0;
transform:translateY(40px);
transition:all .8s ease;
}

.reveal.active{
opacity:1;
transform:translateY(0);
}

.skill-bar{
background:rgba(255,255,255,.08);
border-radius:999px;
overflow:hidden;
height:14px;
margin-top:10px;
}

.skill-fill{
height:100%;
background:linear-gradient(90deg,#06b6d4,#8b5cf6,#ec4899);
animation:load 2s ease forwards;
width:0;
}

@keyframes load{
to{width:var(--w)}
}

.cursor{
width:18px;
height:18px;
border:2px solid cyan;
border-radius:50%;
position:fixed;
pointer-events:none;
transform:translate(-50%,-50%);
z-index:9999;
box-shadow:0 0 20px cyan;
}

.mobile-menu{
display:none;
}

@media(max-width:768px){
.mobile-menu{
display:block;
}
.desktop-menu{
display:none;
}
}
</style>


<style>
html,body{
max-width:100%;
overflow-x:hidden;
}

img{
max-width:100%;
height:auto;
}

.chatbot{
max-width:90vw;
}

@media(max-width:768px){
.chatbot{
width:92%;
right:4%;
bottom:10px;
}

.social-bar{
right:10px;
}

.text-7xl{
font-size:3.5rem !important;
}

.text-5xl{
font-size:2.4rem !important;
}

.typing{
white-space:normal;
border-right:none;
animation:none;
width:auto;
}
}
</style>
